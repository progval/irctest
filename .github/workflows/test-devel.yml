    - name: Checkout UnrealIRCd 6
      uses: actions/checkout@v7
      with:
        path: unrealircd
        ref: unreal60_dev
        repository: unrealircd/unrealircd
        submodules: ''
    - name: Build UnrealIRCd 6
      run: |
        cp $GITHUB_WORKSPACE/data/unreal/* .
        wget https://raw.githubusercontent.com/progval/unrealircd-contrib/eb6b61903c067dda3f8531b5dc08e628fa8c77f9/files/metadata2.c -O src/modules/third/metadata2.c
        # Need to use a specific -march, because GitHub has inconsistent
        # architectures across workers, which result in random SIGILL with some
        # worker combinations
        sudo apt install libsodium-dev libargon2-dev
        CFLAGS="-O0 -march=x86-64" CXXFLAGS="$CFLAGS" ./Config -quick
        make
        make install
        # Prevent download of geoIP database on first startup
        sed -i 's/loadmodule "geoip_classic";//' ~/.local/unrealircd/conf/modules.default.conf

        # In Unreal >= 6.2.6, 'make install' no longer copies these files from the source dir to the conf dir
        cp $GITHUB_WORKSPACE/data/unreal/{server.req.pem,server.key.pem,server.cert.pem} ~/.local/unrealircd/conf/tls/
      working-directory: unrealircd
