  test-ircu2:
    needs: []
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: 3.11
    - name: Checkout ircu2
      uses: actions/checkout@v7
      with:
        path: ircu2
        ref: main
        repository: undernetirc/ircu2
        submodules: ''
    - name: Build ircu2
      run: |
        # ircu2's tests use pytest, and we don't want them to be collected by our pytest
        rm -r tests/

        ./autogen.sh
        # We need --with-maxcon, to set MAXCONNECTIONS so that it's much lower than
        # NN_MAX_CLIENT, or ircu2 crashes with a somewhat cryptic error on startup.
        ./configure --prefix=$HOME/.local/ --with-maxcon=1024 --enable-debug
        make
        make install
      working-directory: ircu2
    - name: Install system dependencies
      run: sudo apt-get install faketime
    - name: Install irctest dependencies
      run: |-
        python -m pip install --upgrade pip
        pip install -r requirements.txt pytest-xdist pytest-timeout
    - env:
        IRCTEST_DEBUG_LOGS: ${{ runner.debug }}
        PYTEST_ARGS: --junit-xml pytest.xml --timeout 300
      name: Test with pytest
      run: |-
        export PATH=~/.local/bin:$PATH
        make ircu2
      timeout-minutes: 30
    - if: always()
      name: Publish results
      uses: actions/upload-artifact@v7
      with:
        name: pytest-results_ircu2_devel
        path: pytest.xml
