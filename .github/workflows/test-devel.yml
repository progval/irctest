  test-sable:
    needs: []
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: 3.11
    - name: Checkout Sable
      uses: actions/checkout@v7
      with:
        path: sable
        ref: master
        repository: Libera-Chat/sable
        submodules: ''
    - name: Install rust toolchain
      uses: actions-rs/toolchain@v1
      with:
        override: true
        profile: minimal
        toolchain: nightly
    - name: Enable Cargo cache
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: true
        workspaces: sable -> target
    - run: rustc --version
    - name: setup pg_hba
      run: 'echo "host all all all trust" | sudo tee -a /etc/postgresql/*/main/pg_hba.conf

        '
    - name: start postgresql
      run: sudo systemctl start postgresql.service
    - name: set postgresql password
      run: 'sudo -u postgres psql -c "ALTER USER postgres PASSWORD ''postgres''"

        '
    - name: check postgresql password
      run: 'PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -c "SELECT
        1;"

        '
    - name: Build Sable
      run: |
        cargo build
      working-directory: sable
    - name: Install system dependencies
      run: sudo apt-get install faketime
    - name: Install irctest dependencies
      run: |-
        python -m pip install --upgrade pip
        pip install -r requirements.txt pytest-xdist pytest-timeout
    - env:
        IRCTEST_DEBUG_LOGS: 1
        IRCTEST_POSTGRESQL_URL: postgresql://postgres:postgres@localhost
        PYTEST_ARGS: --junit-xml pytest.xml --timeout 300
      name: Test with pytest
      run: |-
        export PATH=~/.local/bin:$GITHUB_WORKSPACE/sable/target/debug/sbin:$GITHUB_WORKSPACE/sable/target/debug/bin:$GITHUB_WORKSPACE/sable/target/debug:$PATH
        make sable
      timeout-minutes: 30
    - if: always()
