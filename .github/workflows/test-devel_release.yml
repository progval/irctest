jobs:
  build-anope:
    runs-on: ubuntu-24.04
    steps:
    - name: Create directories
      run: cd ~/; mkdir -p .local/ go/
    - name: Cache dependencies
      uses: actions/cache@v6
      with:
        key: 3-${{ runner.os }}-anope-devel_release
        path: '~/.cache

          ${ github.workspace }/anope

          '
    - uses: actions/checkout@v7
    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: 3.11
    - name: Install system dependencies
      run: sudo apt-get install libltdl-dev
    - name: Calculate job count
      run: echo MAKEFLAGS=-j$(($(getconf _NPROCESSORS_ONLN) + 1)) >> $GITHUB_ENV
    - name: Checkout Anope
      uses: actions/checkout@v7
      with:
        path: anope
        ref: '2.0'
        repository: anope/anope
        submodules: ''
    - name: Build Anope
      run: |
        sudo apt-get install ninja-build --no-install-recommends
        cmake -B build \
              -D CMAKE_BUILD_TYPE=Debug \
              -D CMAKE_INSTALL_PREFIX=$HOME/.local \
              -D CMAKE_UNITY_BUILD=ON \
              -D CMAKE_UNITY_BUILD_BATCH_SIZE=0 \
              -D PROGRAM_NAME=anope \
              -D USE_PCH=ON \
              -G Ninja
        ninja -C build install
      working-directory: anope
    - name: Make artefact tarball
      run: cd ~; tar -czf artefacts-anope.tar.gz .local/ go/
    - name: Upload build artefacts
      uses: actions/upload-artifact@v7
      with:
        name: installed-anope
        path: ~/artefacts-*.tar.gz
        retention-days: 1
  build-inspircd:
    runs-on: ubuntu-24.04
    steps:
    - name: Create directories
      run: cd ~/; mkdir -p .local/ go/
    - uses: actions/checkout@v7
    - name: Set up Python 3.11
      uses: actions/setup-python@v6
      with:
        python-version: 3.11
    - name: Install system dependencies
      run: sudo apt-get install libltdl-dev
    - name: Calculate job count
      run: echo MAKEFLAGS=-j$(($(getconf _NPROCESSORS_ONLN) + 1)) >> $GITHUB_ENV
    - name: Checkout InspIRCd
      uses: actions/checkout@v7
      with:
        path: inspircd
        ref: insp4
        repository: inspircd/inspircd
        submodules: ''
    - name: Build InspIRCd
      run: |
        export CXXFLAGS="-DINSPIRCD_UNLIMITED_MAINLOOP"
        if [ -f CMakeLists.txt ]
        then
            # We are building v5 or newer
            sudo apt-get install ninja-build --no-install-recommends
            cmake -B build \
                  -D CMAKE_BUILD_TYPE=Debug \
                  -D CMAKE_INSTALL_PREFIX=$HOME/.local/inspircd \
                  -D CMAKE_UNITY_BUILD=ON \
                  -D CMAKE_UNITY_BUILD_BATCH_SIZE=0 \
                  -G Ninja
            ninja -C build install
        else
            # We are building v4 or older
           ./configure --prefix=$HOME/.local/inspircd --development
            make install
        fi
      working-directory: inspircd
    - name: Make artefact tarball
      run: cd ~; tar -czf artefacts-inspircd.tar.gz .local/ go/
    - name: Upload build artefacts
      uses: actions/upload-artifact@v7
      with:
        name: installed-inspircd
        path: ~/artefacts-*.tar.gz
        retention-days: 1
  publish-test-results:
    if: success() || failure()
    name: Publish Dashboard
    needs:
    - test-inspircd
    - test-inspircd-anope
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v7
    - name: Download Artifacts
      uses: actions/download-artifact@v8
      with:
        path: artifacts
    - name: Install dashboard dependencies
      run: |-
        python -m pip install --upgrade pip
        pip install defusedxml docutils -r requirements.txt
    - name: Generate dashboard
      run: |-
        shopt -s globstar
        python3 -m irctest.dashboard.format dashboard/ artifacts/**/*.xml
        echo '/ /index.xhtml' > dashboard/_redirects
    - name: Install netlify-cli
      run: npm i -g netlify-cli
    - env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
      name: Deploy to Netlify
      run: ./.github/deploy_to_netlify.py
  test-inspircd:
    needs:
    - build-inspircd
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: 3.11
    - name: Download build artefacts
      uses: actions/download-artifact@v8
      with:
        name: installed-inspircd
        path: '~'
    - name: Unpack artefacts
      run: cd ~; find -name 'artefacts-*.tar.gz' -exec tar -xzf '{}' \;
    - name: Install system dependencies
      run: sudo apt-get install faketime
    - name: Install irctest dependencies
      run: |-
        python -m pip install --upgrade pip
        pip install -r requirements.txt pytest-xdist pytest-timeout
    - env:
        IRCTEST_DEBUG_LOGS: ${{ runner.debug }}
        PYTEST_ARGS: --junit-xml pytest.xml --timeout 300
      name: Test with pytest
      run: |-
        export PATH=~/.local/bin:~/.local/inspircd/sbin:~/.local/inspircd/bin:~/.local/inspircd:$PATH
        make inspircd
      timeout-minutes: 30
    - if: always()
      name: Publish results
      uses: actions/upload-artifact@v7
      with:
        name: pytest-results_inspircd_devel_release
        path: pytest.xml
  test-inspircd-anope:
    needs:
    - build-inspircd
    - build-anope
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v7
    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: 3.11
    - name: Download build artefacts
      uses: actions/download-artifact@v8
      with:
        name: installed-inspircd
        path: '~'
    - name: Download build artefacts
      uses: actions/download-artifact@v8
      with:
        name: installed-anope
        path: '~'
    - name: Unpack artefacts
      run: cd ~; find -name 'artefacts-*.tar.gz' -exec tar -xzf '{}' \;
    - name: Install system dependencies
      run: sudo apt-get install faketime
    - name: Install irctest dependencies
      run: |-
        python -m pip install --upgrade pip
        pip install -r requirements.txt pytest-xdist pytest-timeout
    - env:
        IRCTEST_DEBUG_LOGS: ${{ runner.debug }}
        PYTEST_ARGS: --junit-xml pytest.xml --timeout 300
      name: Test with pytest
      run: |-
        export PATH=~/.local/bin:~/.local/inspircd/sbin:~/.local/inspircd/bin:~/.local/inspircd:$PATH
        make inspircd-anope
      timeout-minutes: 30
    - if: always()
      name: Publish results
      uses: actions/upload-artifact@v7
      with:
        name: pytest-results_inspircd-anope_devel_release
        path: pytest.xml
